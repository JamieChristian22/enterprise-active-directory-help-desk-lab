apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: operations-api
  namespace: cloud-ops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: operations-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target: {type: Utilization, averageUtilization: 65}
